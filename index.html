<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1167 Trương Định, Checker & Multi-Level Note</title>
    
    <link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/4/40/7-eleven_logo.svg/1280px-7-eleven_logo.svg.png">
    
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        /* CSS Reset & Font */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
        
        /* BIẾN MÀU SẮC CHUẨN 7-ELEVEN */
        :root {
            --7e-green: #008062;
            --7e-orange: #F37021;
            --7e-red: #E2231A;
            --bg-main: #F4F5F7;
            --bg-card: #ffffff;
            --text-main: #333;
            --text-muted: #666;
            --border-color: #eee;
            --input-bg: #fff;
        }

        [data-theme="dark"] {
            --bg-main: #121212;
            --bg-card: #1e1e1e;
            --text-main: #f1f1f1;
            --text-muted: #aaa;
            --border-color: #333;
            --input-bg: #2c2c2c;
        }

        body { background-color: var(--bg-main); color: var(--text-main); display: flex; justify-content: center; padding: 20px 10px; transition: 0.3s; }
        
        .app-container { width: 100%; max-width: 480px; background: var(--bg-card); border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); overflow: hidden; transition: 0.3s; }

        /* Header chuẩn 7-Eleven */
        .app-header { background: var(--bg-card); display: flex; justify-content: space-between; align-items: center; padding: 15px 15px; border-bottom: 1px solid var(--border-color); position: relative; }
        .app-header::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 6px; background: linear-gradient(to right, var(--7e-green) 33%, var(--7e-red) 33%, var(--7e-red) 66%, var(--7e-orange) 66%); }
        
        .header-left { display: flex; align-items: center; gap: 10px; }
        .app-logo { height: 32px; width: auto; object-fit: contain; }
        .app-header h2 { color: var(--7e-green); font-size: 19px; font-weight: 800; }
        
        .theme-btn { background: none; border: none; font-size: 22px; cursor: pointer; padding: 5px; border-radius: 50%; }

        .app-body { padding: 20px; }
        .status-bar { text-align: center; font-size: 13px; font-weight: 600; padding: 8px; border-radius: 6px; margin-bottom: 20px; background: #e8f5e9; color: var(--7e-green); transition: 0.3s; }

        .form-group { margin-bottom: 12px; }
        .row-inputs { display: flex; gap: 10px; }
        .row-inputs .form-group { flex: 1; margin-bottom: 15px; }

        label { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 5px; display: block; }
        input { width: 100%; padding: 11px; border: 2px solid var(--border-color); border-radius: 8px; font-size: 14px; background: var(--input-bg); color: var(--text-main); transition: 0.3s; }
        input:focus { border-color: var(--7e-green); outline: none; }

        .btn { width: 100%; padding: 14px; font-size: 15px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; color: white; display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 8px; transition: 0.2s; }
        .btn:active { transform: scale(0.98); }
        .btn-scan { background-color: var(--7e-orange); }
        .btn-scan:hover { background-color: #d6611a; }
        
        #reader { width: 100%; border-radius: 8px; overflow: hidden; margin-top: 10px; }

        /* Khối danh sách tổng */
        .history-section { margin-top: 25px; border-top: 2px dashed var(--border-color); padding-top: 15px; }
        .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .history-header h3 { font-size: 15px; color: var(--text-muted); text-transform: uppercase; font-weight: bold; }
        .btn-clear-history { background: none; border: none; color: var(--7e-red); font-size: 13px; cursor: pointer; font-weight: bold; }
        
        /* CẤP 1: KHUNG TOÀN CỤC BAO QUÁT (MÃ KỆ LỚN) */
        .zone-block { border: 2.5px solid var(--7e-orange); border-radius: 16px; padding: 14px; margin-bottom: 25px; background: var(--bg-card); box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: relative; }
        .zone-title { font-size: 13px; font-weight: 800; color: white; background-color: var(--7e-orange); padding: 5px 14px; border-radius: 20px; display: inline-block; margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.5px; }

        /* CẤP 2: KHUNG CON BÊN TRONG (TÊN KỆ NHỎ) */
        .shelf-block { border: 1.5px solid var(--7e-green); border-radius: 12px; padding: 10px; margin-bottom: 12px; background: var(--bg-main); }
        .shelf-block:last-child { margin-bottom: 0; }
        .shelf-title { font-size: 12px; font-weight: 700; color: var(--7e-green); margin-bottom: 10px; display: flex; align-items: center; gap: 4px; text-transform: uppercase;}
        
        /* CẤP 3: THÀNH PHẦN SẢN PHẨM */
        .history-list { list-style: none; }
        .history-item { background: var(--bg-card); border: 1px solid var(--border-color); margin-bottom: 8px; padding: 10px; border-radius: 8px; display: flex; flex-direction: column; gap: 6px; }
        .history-item:last-child { margin-bottom: 0; }
        
        .item-info { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dotted var(--border-color); padding-bottom: 4px; }
        .hist-name { font-weight: 700; font-size: 14px; color: var(--text-main); max-width: 80%; }
        .hist-count { font-size: 10px; background: var(--border-color); color: var(--text-muted); padding: 1px 5px; border-radius: 10px; font-weight: bold; }
        
        .barcode-box { background: white; padding: 6px; border-radius: 6px; text-align: center; border: 1px solid #eee; width: 100%; display: flex; justify-content: center; }
        .barcode-box svg { max-width: 100%; height: auto; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="app-header">
        <div class="header-left">
            <img src="https://upload.wikimedia.org/wikipedia/commons/4/40/7-eleven_logo.svg" alt="7-Eleven Logo" class="app-logo">
            <h2>1167 Trương Định</h2>
        </div>
        <button class="theme-btn" onclick="toggleTheme()" id="themeIcon">🌙</button>
    </div>

    <div class="app-body">
        <div id="loadingStatus" class="status-bar">🔄 Đang đồng bộ máy chủ...</div>

        <!-- HÀNG INPUT PHÂN CẤP KỆ -->
        <div class="row-inputs">
            <div class="form-group">
                <label style="color: var(--7e-orange);">📦 Mã Kệ Lớn (Vùng)</label>
                <input type="text" id="zoneInput" placeholder="VD: ZONE-A, TỦ-LỚN..." style="border-color: var(--7e-orange); font-weight: bold;">
            </div>
            <div class="form-group">
                <label style="color: var(--7e-green);">📍 Tên Kệ Nhỏ (Tầng)</label>
                <input type="text" id="shelfInput" placeholder="VD: Tầng 1, Máng 2..." style="border-color: var(--7e-green); font-weight: bold;">
            </div>
        </div>

        <!-- Nhập / Quét mã -->
        <div class="form-group">
            <label>Mã Vạch Sản Phẩm</label>
            <input type="text" id="barcodeInput" placeholder="Nhập mã hoặc quét camera..." autocomplete="off">
            <button class="btn btn-scan" onclick="startScan()">📷 BẬT MÁY QUÉT</button>
            <div id="reader"></div>
        </div>

        <!-- Chọn tên sản phẩm từ dropdown -->
        <div class="form-group">
            <label>Tên Sản Phẩm (Chọn nhanh)</label>
            <input list="productDataList" id="nameInput" placeholder="Gõ tên sản phẩm để chọn nhanh..." autocomplete="off">
            <datalist id="productDataList"></datalist>
        </div>

        <!-- Vùng báo cáo đóng khung đa tầng -->
        <div class="history-section">
            <div class="history-header">
                <h3>Báo cáo cấu trúc kho (<span id="itemCount">0</span> mã)</h3>
                <button class="btn-clear-history" onclick="clearAllList()">🗑️ Xóa tất cả</button>
            </div>
            
            <!-- Vùng hiển thị cấu trúc Mã Kệ Lớn lồng Tên Kệ Nhỏ -->
            <div id="multiLevelContainer">
                <!-- Data sinh tự động -->
            </div>
        </div>
    </div>
</div>

<script>
    // Link Google Sheet API Apps Script của bạn
    const GOOGLE_SHEET_API = "https://script.google.com/macros/s/AKfycbzIXfDD-sM0anPvkNMh9RsIcK53VbMsVv035Ke7cS7HPk_Jj3CT0H9Cc1LeHAeflsdH/exec"; 
    
    let products = []; 
    let html5QrCode; 
    let scannedList = JSON.parse(localStorage.getItem('scannedList')) || [];

    function initTheme() {
        const savedTheme = localStorage.getItem('appTheme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        document.getElementById('themeIcon').innerText = savedTheme === 'dark' ? '☀️' : '🌙';
    }
    
    function toggleTheme() {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('appTheme', newTheme);
        document.getElementById('themeIcon').innerText = newTheme === 'dark' ? '☀️' : '🌙';
    }

    async function loadDatabaseFromSheet() {
        const statusDiv = document.getElementById('loadingStatus');
        try {
            const response = await fetch(GOOGLE_SHEET_API);
            const rawData = await response.json();
            
            products = rawData.map(item => {
                const keys = Object.keys(item);
                return {
                    Barcode: item[keys[0]] ? String(item[keys[0]]).trim() : "",
                    ProductName: item[keys[1]] ? String(item[keys[1]]).trim() : "Sản phẩm không tên"
                };
            }).filter(p => p.Barcode !== "");

            const datalist = document.getElementById('productDataList');
            datalist.innerHTML = ""; 
            products.forEach(p => {
                let option = document.createElement('option');
                option.value = p.ProductName;
                datalist.appendChild(option);
            });
            
            statusDiv.style.background = "#e8f5e9";
            statusDiv.style.color = "var(--7e-green)";
            statusDiv.innerText = "✅ Kết nối Database thành công!";
            setTimeout(() => { statusDiv.style.display = "none"; }, 2500); 
        } catch (error) {
            statusDiv.style.background = "#ffebee";
            statusDiv.style.color = "var(--7e-red)";
            statusDiv.innerText = "❌ Lỗi kết nối máy chủ!";
        }
    }

    // --- SỰ KIỆN ENTER / CHỌN ---
    document.getElementById('barcodeInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            const barcode = this.value.trim();
            if (barcode) {
                const found = products.find(p => String(p.Barcode) === String(barcode));
                const name = found ? found.ProductName : "Sản phẩm mới (Không có trong DB)";
                addItemToList(barcode, name);
                this.value = '';
            }
        }
    });

    document.getElementById('nameInput').addEventListener('input', function() {
        const nameVal = this.value.trim();
        const found = products.find(p => p.ProductName.toLowerCase() === nameVal.toLowerCase());
        if (found) {
            addItemToList(String(found.Barcode), found.ProductName);
            this.value = ''; 
            document.getElementById('barcodeInput').focus();
        }
    });

    function startScan() {
        if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
        const config = { fps: 15, qrbox: { width: 280, height: 100 } };

        html5QrCode.start(
            { facingMode: "environment" }, 
            config,
            (decodedText) => {
                const found = products.find(p => String(p.Barcode) === String(decodedText));
                const name = found ? found.ProductName : "Sản phẩm mới (Không có trong DB)";
                addItemToList(decodedText, name);
                html5QrCode.stop().then(() => { document.getElementById('reader').innerHTML = ""; });
            },
            (errorMessage) => { }
        ).catch(err => { alert("Vui lòng cấp quyền Camera!"); });
    }

    // --- LOGIC XỬ LÝ LỒNG GHÉP 3 CẤP ---
    function addItemToList(barcode, name) {
        const uniqueId = 'bc_' + Math.random().toString(36).substr(2, 9);
        
        let zoneName = document.getElementById('zoneInput').value.trim();
        if (!zoneName) zoneName = "Khu chung";

        let shelfName = document.getElementById('shelfInput').value.trim();
        if (!shelfName) shelfName = "Kệ chung";

        // Lưu thông tin kèm theo cả cấp to (zone) và cấp nhỏ (shelf)
        scannedList.unshift({ id: uniqueId, barcode: barcode, name: name, zone: zoneName, shelf: shelfName });
        localStorage.setItem('scannedList', JSON.stringify(scannedList));
        renderScannedList();
    }

    function renderScannedList() {
        const container = document.getElementById('multiLevelContainer');
        const countEl = document.getElementById('itemCount');
        container.innerHTML = "";
        countEl.innerText = scannedList.length;

        if (scannedList.length === 0) {
            container.innerHTML = "<div style='text-align:center; color:#aaa; font-size:13px; padding: 20px 0;'>Chưa có dữ liệu phân tầng</div>";
            return;
        }

        // Tạo cấu trúc dữ liệu dạng cây: Zone -> Shelf -> Items
        const treeData = {};
        scannedList.forEach((item, index) => {
            const orgIndex = scannedList.length - index; // Số thứ tự đếm ngược chuẩn xác
            
            if (!treeData[item.zone]) {
                treeData[item.zone] = {};
            }
            if (!treeData[item.zone][item.shelf]) {
                treeData[item.zone][item.shelf] = [];
            }
            treeData[item.zone][item.shelf].push({ ...item, displayIndex: orgIndex });
        });

        // Vẽ giao diện theo cấu trúc cây
        Object.keys(treeData).forEach(zoneName => {
            // Tạo khung CẤP 1 (Mã Kệ Lớn - Viền Cam)
            const zoneBlock = document.createElement('div');
            zoneBlock.className = 'zone-block';
            zoneBlock.innerHTML = `<div class="zone-title">📦 Mã kệ: ${zoneName}</div>`;

            // Duyệt tiếp để tạo khung CẤP 2 bên trong (Tên Kệ Nhỏ - Viền Xanh)
            Object.keys(treeData[zoneName]).forEach(shelfName => {
                const shelfBlock = document.createElement('div');
                shelfBlock.className = 'shelf-block';
                shelfBlock.innerHTML = `<div class="shelf-title">📍 ${shelfName}</div>`;

                const ul = document.createElement('ul');
                ul.className = 'history-list';

                // Thêm sản phẩm vào trong danh sách của Kệ nhỏ
                treeData[zoneName][shelfName].forEach(item => {
                    ul.innerHTML += `
                        <li class="history-item">
                            <div class="item-info">
                                <span class="hist-name">${item.name}</span>
                                <span class="hist-count">#${item.displayIndex}</span>
                            </div>
                            <div class="barcode-box">
                                <svg id="${item.id}"></svg>
                            </div>
                        </li>
                    `;
                });

                shelfBlock.appendChild(ul);
                zoneBlock.appendChild(shelfBlock);
            });

            container.appendChild(zoneBlock);

            // Vẽ sọc barcode sau khi DOM đã dựng xong hoàn toàn
            Object.keys(treeData[zoneName]).forEach(shelfName => {
                treeData[zoneName][shelfName].forEach(item => {
                    setTimeout(() => {
                        try {
                            JsBarcode(`#${item.id}`, String(item.barcode), {
                                format: "CODE128",
                                lineColor: "#000",
                                width: 1.8,
                                height: 40,
                                displayValue: true, 
                                fontSize: 12,
                                margin: 2
                            });
                        } catch (e) {
                            document.getElementById(item.id).outerHTML = `<span style="color:var(--7e-red); font-size:11px;">Mã lỗi: ${item.barcode}</span>`;
                        }
                    }, 5);
                });
            });
        });
    }

    function clearAllList() {
        if (confirm("Xóa toàn bộ cấu trúc sơ đồ kệ tạm thời này?")) {
            scannedList = [];
            localStorage.removeItem('scannedList');
            renderScannedList();
        }
    }

    window.onload = () => {
        initTheme();
        renderScannedList();
        loadDatabaseFromSheet();
    };
</script>
</body>
</html>
