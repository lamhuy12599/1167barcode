<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7-Eleven Barcode Scanner & Note</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* Custom màu sắc theo chuẩn 7-Eleven */
        .bg-711-green { background-color: #00843D; }
        .text-711-green { color: #00843D; }
        .bg-711-orange { background-color: #EE7203; }
        .border-711-red { border-color: #EB1A22; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans pb-10">

    <header class="bg-711-green text-white p-4 shadow-md sticky top-0 z-50 rounded-b-2xl">
        <div class="container mx-auto flex justify-between items-center px-2">
            <h1 class="text-xl font-bold tracking-wider flex items-center gap-2">
                <span class="bg-white text-711-green px-2 py-0.5 rounded-md font-black text-2xl">7</span> 
                <span>QUÉT MÃ & GHI CHÚ</span>
            </h1>
            <span class="text-xs bg-711-orange px-3 py-1 rounded-full font-semibold shadow">Hệ thống tạm</span>
        </div>
    </header>

    <main class="container mx-auto max-w-md p-4 mt-4 space-y-4">
        
        <div class="bg-white p-5 rounded-2xl shadow-sm border-t-4 border-711-red space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Quét hoặc Nhập Barcode</label>
                <input type="text" id="barcodeInput" placeholder="Đặt con trỏ vào đây để quét..." 
                       class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-711-green transition">
            </div>

            <div class="relative flex py-2 items-center">
                <div class="flex-grow border-t border-gray-200"></div>
                <span class="flex-shrink mx-4 text-gray-400 text-xs uppercase">Hoặc chọn nhanh</span>
                <div class="flex-grow border-t border-gray-200"></div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Chọn Tên Sản Phẩm (Dropdown)</label>
                <select id="productDropdown" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-711-green bg-white transition">
                    <option value="">-- Chọn sản phẩm có sẵn --</option>
                </select>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm p-4 space-y-3">
            <div class="flex justify-between items-center border-b border-gray-100 pb-2">
                <h2 class="font-bold text-gray-800 text-lg flex items-center gap-1.5">
                    Danh sách tạm <span id="itemCount" class="text-sm bg-gray-200 text-gray-700 px-2 py-0.5 rounded-full">0</span>
                </h2>
                <button onclick="clearAll()" class="text-xs text-red-500 hover:text-red-700 font-semibold flex items-center gap-1 bg-red-50 p-2 rounded-lg transition">
                    🗑️ Xóa tất cả
                </button>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <thead>
                        <tr class="text-gray-500 border-b border-gray-100">
                            <th class="py-2">Barcode</th>
                            <th class="py-2">Tên sản phẩm</th>
                            <th class="py-2 text-right">Thời gian</th>
                        </tr>
                    </thead>
                    <tbody id="reportTableBody" class="divide-y divide-gray-50">
                        </tbody>
                </table>
            </div>

            <div class="pt-2">
                <button onclick="exportToNotepad()" class="w-full bg-711-orange hover:bg-orange-600 text-white font-bold py-3 px-4 rounded-xl shadow transition flex justify-center items-center gap-2">
                    💾 Xuất file Notepad (.txt)
                </button>
            </div>
        </div>
    </main>

    <script>
        // CONFIG: Thay link CSV từ Google Sheet của bạn vào đây
        const GOOGLE_SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSx0eOzjqqt0D2GPzvaSgppmiJvKaHf_spnk3V8qGr4Pb71IEpNIxjMIQg_UHcnNLUNOLyk0Kab0ttV/pub?output=csv';

        let productDatabase = {}; // Định dạng: { "barcode": "Tên sản phẩm" }
        let scannedList = JSON.parse(localStorage.getItem('scannedList')) || [];

        // 1. Lấy dữ liệu từ Google Sheet (khi bạn cấu hình link thật)
        async function loadDatabase() {
            try {
                const response = await fetch(GOOGLE_SHEET_CSV_URL);
                const data = await response.text();
                parseCSV(data);
            } catch (error) {
                console.error("Chưa cấu hình Google Sheet hoặc lỗi kết nối. Đang dùng db demo.", error);
                // Database mẫu nếu chưa cấu hình Google Sheet công khai
                parseCSV("Barcode,TenSanPham\n8934563123456,Mì Ly Cung Đình\n8935001234567,Nước Ngọt Coca-Cola\n8934822123456,Bánh Bao 7-Eleven");
            }
        }

        // Chuyển đổi CSV sang Object và nạp vào Dropdown
        function parseCSV(csvText) {
            const lines = csvText.split('\n');
            const dropdown = document.getElementById('productDropdown');
            
            // Bỏ dòng header đầu tiên, duyệt các dòng sau
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i]) continue;
                const columns = lines[i].split(',');
                const barcode = columns[0].trim();
                const name = columns[1]?.trim();

                if (barcode && name) {
                    productDatabase[barcode] = name;
                    
                    // Thêm vào dropdown
                    let option = document.createElement('option');
                    option.value = barcode;
                    option.textContent = `${name} (${barcode})`;
                    dropdown.appendChild(option);
                }
            }
        }

        // 2. Xử lý khi quét Barcode (Nhấn Enter từ máy quét)
        document.getElementById('barcodeInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const barcode = this.value.trim();
                if (barcode) {
                    addItemToList(barcode);
                    this.value = ''; // Xóa text box để chờ lượt quét tiếp theo
                }
            }
        });

        // Xử lý khi chọn từ Dropdown
        document.getElementById('productDropdown').addEventListener('change', function() {
            const barcode = this.value;
            if (barcode) {
                addItemToList(barcode);
                this.value = ''; // Reset dropdown
            }
        });

        // 3. Thêm món ăn vào danh sách tạm
        function addItemToList(barcode) {
            const name = productDatabase[barcode] || "Sản phẩm mới (Chưa có trong DB)";
            const time = new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });

            // Đưa lên đầu danh sách
            scannedList.unshift({ barcode, name, time });
            
            // Lưu vào bộ nhớ trình duyệt (LocalStorage) để F5 không bị mất dữ liệu
            localStorage.setItem('scannedList', JSON.stringify(scannedList));
            
            renderTable();
        }

        // Hiển thị dữ liệu lên bảng
        function renderTable() {
            const tbody = document.getElementById('reportTableBody');
            const countBadge = document.getElementById('itemCount');
            tbody.innerHTML = '';
            
            countBadge.textContent = scannedList.length;

            if(scannedList.length === 0) {
                tbody.innerHTML = `<tr><td colspan="3" class="text-center py-6 text-gray-400 italic">Chưa có sản phẩm nào được quét</td></tr>`;
                return;
            }

            scannedList.forEach(item => {
                let row = `
                    <tr class="hover:bg-gray-50">
                        <td class="py-3 font-mono text-xs text-gray-600">${item.barcode}</td>
                        <td class="py-3 font-medium text-gray-800">${item.name}</td>
                        <td class="py-3 text-right text-gray-400 text-xs">${item.time}</td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });
        }

        // 4. Chức năng Xóa tất cả
        function clearAll() {
            if(confirm("Bạn có chắc chắn muốn xóa toàn bộ danh sách tạm không?")) {
                scannedList = [];
                localStorage.removeItem('scannedList');
                renderTable();
            }
        }

        // 5. Chức năng Xuất file Notepad (.txt)
        function exportToNotepad() {
            if(scannedList.length === 0) {
                alert("Danh sách trống, không có gì để xuất!");
                return;
            }

            let textContent = `=== BÁO CÁO DANH SÁCH QUÉT SẢN PHẨM ===\n`;
            textContent += `Ngày xuất: ${new Date().toLocaleDateString('vi-VN')} - Lượng món: ${scannedList.length}\n`;
            textContent += `-------------------------------------------\n`;
            
            scannedList.forEach((item, index) => {
                textContent += `[${item.time}] ${item.barcode} | ${item.name}\n`;
            });

            // Tạo file download ngay trên trình duyệt
            const blob = new Blob([textContent], { type: 'text/plain;charset=utf-8' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `BaoCao_Quet_7Eleven_${new Date().toISOString().slice(0,10)}.txt`;
            link.click();
        }

        // Khởi chạy khi load trang
        window.onload = function() {
            loadDatabase();
            renderTable();
            document.getElementById('barcodeInput').focus(); // Tự động focus vào ô quét mã
        }
    </script>
</body>
</html>
