<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7-Eleven Barcode Scanner & Note</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        .bg-711-green { background-color: #00843D; }
        .text-711-green { color: #00843D; }
        .bg-711-orange { background-color: #EE7203; }
        .border-711-red { border-color: #EB1A22; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans pb-10">

    <header class="bg-711-green text-white p-4 shadow-md sticky top-0 z-50 rounded-b-2xl">
        <div class="container mx-auto flex justify-between items-center px-2">
            <h1 class="text-xl font-bold tracking-wider flex items-center gap-2">
                <span class="bg-white text-711-green px-2 py-0.5 rounded-md font-black text-2xl">7</span> 
                <span>QUÉT MÃ & GHI CHÚ</span>
            </h1>
            <span class="text-xs bg-711-orange px-3 py-1 rounded-full font-semibold shadow">Hệ thống tạm</span>
        </div>
    </header>

    <main class="container mx-auto max-w-md p-4 mt-4 space-y-4">
        
        <div class="bg-white p-5 rounded-2xl shadow-sm border-t-4 border-711-red space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Quét hoặc Nhập Barcode</label>
                <div class="flex gap-2">
                    <input type="text" id="barcodeInput" placeholder="Đặt con trỏ vào đây để quét..." 
                           class="flex-1 px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-711-green transition">
                    <button onclick="toggleCamera()" class="bg-711-green hover:bg-emerald-700 text-white p-3 rounded-xl shadow transition flex items-center justify-center">
                        📷
                    </button>
                </div>
            </div>

            <div id="cameraContainer" class="hidden border border-gray-200 rounded-xl overflow-hidden bg-black relative">
                <div id="reader" class="w-full"></div>
                <button onclick="toggleCamera()" class="absolute top-2 right-2 bg-red-500 text-white text-xs px-2 py-1 rounded-lg z-10">Đóng Cam</button>
            </div>

            <div class="relative flex py-1 items-center">
                <div class="flex-grow border-t border-gray-200"></div>
                <span class="flex-shrink mx-4 text-gray-400 text-xs uppercase">Hoặc chọn nhanh</span>
                <div class="flex-grow border-t border-gray-200"></div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Chọn Tên Sản Phẩm (Dropdown)</label>
                <select id="productDropdown" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-711-green bg-white transition">
                    <option value="">-- Chọn sản phẩm có sẵn --</option>
                </select>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm p-4 space-y-3">
            <div class="flex justify-between items-center border-b border-gray-100 pb-2">
                <h2 class="font-bold text-gray-800 text-lg flex items-center gap-1.5">
                    Danh sách tạm <span id="itemCount" class="text-sm bg-gray-200 text-gray-700 px-2 py-0.5 rounded-full">0</span>
                </h2>
                <button onclick="clearAll()" class="text-xs text-red-500 hover:text-red-700 font-semibold flex items-center gap-1 bg-red-50 p-2 rounded-lg transition">
                    🗑️ Xóa tất cả
                </button>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <thead>
                        <tr class="text-gray-500 border-b border-gray-100">
                            <th class="py-2 pl-2">Mã Barcode (Sọc quét)</th>
                            <th class="py-2">Tên sản phẩm</th>
                        </tr>
                    </thead>
                    <tbody id="reportTableBody" class="divide-y divide-gray-50">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // CONFIG: Thay link CSV từ Google Sheet của bạn vào đây
        const GOOGLE_SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSx0eOzjqqt0D2GPzvaSgppmiJvKaHf_spnk3V8qGr4Pb71IEpNIxjMIQg_UHcnNLUNOLyk0Kab0ttV/pubhtml';

        let productDatabase = {}; 
        let scannedList = JSON.parse(localStorage.getItem('scannedList')) || [];
        let html5QrcodeScanner = null;

        async function loadDatabase() {
            try {
                const response = await fetch(GOOGLE_SHEET_CSV_URL);
                const data = await response.text();
                parseCSV(data);
            } catch (error) {
                console.error("Chưa cấu hình Google Sheet hoặc lỗi kết nối. Đang dùng db demo.", error);
                parseCSV("Barcode,TenSanPham\n8934563123456,Mì Ly Cung Đình\n8935001234567,Nước Ngọt Coca-Cola\n8934822123456,Bánh Bao 7-Eleven");
            }
        }

        function parseCSV(csvText) {
            const lines = csvText.split('\n');
            const dropdown = document.getElementById('productDropdown');
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i]) continue;
                const columns = lines[i].split(',');
                const barcode = columns[0].trim();
                const name = columns[1]?.trim();

                if (barcode && name) {
                    productDatabase[barcode] = name;
                    let option = document.createElement('option');
                    option.value = barcode;
                    option.textContent = `${name} (${barcode})`;
                    dropdown.appendChild(option);
                }
            }
        }

        // Xử lý khi nhập bằng tay/máy quét phần cứng qua cổng USB
        document.getElementById('barcodeInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const barcode = this.value.trim();
                if (barcode) {
                    addItemToList(barcode);
                    this.value = '';
                }
            }
        });

        // Xử lý khi chọn từ Dropdown
        document.getElementById('productDropdown').addEventListener('change', function() {
            const barcode = this.value;
            if (barcode) {
                addItemToList(barcode);
                this.value = ''; 
            }
        });

        // Bật / Tắt Camera để quét mã vạch bằng điện thoại
        function toggleCamera() {
            const container = document.getElementById('cameraContainer');
            if (container.classList.contains('hidden')) {
                container.classList.remove('hidden');
                
                html5QrcodeScanner = new Html5Qrcode("reader");
                html5QrcodeScanner.start(
                    { facingMode: "environment" }, 
                    {
                        fps: 10,
                        qrbox: (width, height) => {
                            return { width: width * 0.8, height: height * 0.4 } 
                        }
                    },
                    (decodedText) => {
                        addItemToList(decodedText);
                        toggleCamera(); 
                    },
                    (errorMessage) => { }
                ).catch(err => {
                    alert("Không thể truy cập Camera: " + err);
                    container.classList.add('hidden');
                });
            } else {
                container.classList.add('hidden');
                if (html5QrcodeScanner) {
                    html5QrcodeScanner.stop().then(() => {
                        html5QrcodeScanner = null;
                    });
                }
            }
        }

        function addItemToList(barcode) {
            const name = productDatabase[barcode] || "Sản phẩm mới (Chưa có trong DB)";
            const uniqueId = 'bc_' + Math.random().toString(36).substr(2, 9);

            scannedList.unshift({ id: uniqueId, barcode, name });
            localStorage.setItem('scannedList', JSON.stringify(scannedList));
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('reportTableBody');
            const countBadge = document.getElementById('itemCount');
            tbody.innerHTML = '';
            countBadge.textContent = scannedList.length;

            if(scannedList.length === 0) {
                tbody.innerHTML = `<tr><td colspan="2" class="text-center py-6 text-gray-400 italic">Chưa có sản phẩm nào được quét</td></tr>`;
                return;
            }

            scannedList.forEach(item => {
                let row = `
                    <tr class="hover:bg-gray-50">
                        <td class="py-2 pl-2 align-middle">
                            <svg id="${item.id}"></svg>
                        </td>
                        <td class="py-2 font-medium text-gray-800 align-middle">${item.name}</td>
                    </tr>
                `;
                tbody.innerHTML += row;

                setTimeout(() => {
                    try {
                        JsBarcode(`#${item.id}`, item.barcode, {
                            format: "CODE128", 
                            width: 1.5,
                            height: 40,
                            displayValue: true, 
                            fontSize: 12,
                            margin: 4
                        });
                    } catch(e) {
                        document.getElementById(item.id).outerHTML = `<span class="text-xs font-mono text-red-500">${item.barcode} (Lỗi định dạng mã)</span>`;
                    }
                }, 5);
            });
        }

        function clearAll() {
            if(confirm("Bạn có chắc chắn muốn xóa toàn bộ danh sách tạm không?")) {
                scannedList = [];
                localStorage.removeItem('scannedList');
                renderTable();
            }
        }

        window.onload = function() {
            loadDatabase();
            renderTable();
            document.getElementById('barcodeInput').focus();
        }
    </script>
</body>
</html>
