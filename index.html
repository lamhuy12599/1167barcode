<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1167 Trương Định, Ghi Chú & Quét Barcode</title>
    
    <link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/4/40/7-eleven_logo.svg/1280px-7-eleven_logo.svg.png">
    
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        /* CSS Reset & Font */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
        
        /* BIẾN MÀU SẮC CHUẨN 7-ELEVEN */
        :root {
            --7e-green: #008062;
            --7e-orange: #F37021;
            --7e-red: #E2231A;
            --bg-main: #F4F5F7;
            --bg-card: #ffffff;
            --text-main: #333;
            --text-muted: #666;
            --border-color: #eee;
            --input-bg: #fff;
        }

        [data-theme="dark"] {
            --bg-main: #121212;
            --bg-card: #1e1e1e;
            --text-main: #f1f1f1;
            --text-muted: #aaa;
            --border-color: #333;
            --input-bg: #2c2c2c;
        }

        body { background-color: var(--bg-main); color: var(--text-main); display: flex; justify-content: center; padding: 20px 10px; transition: 0.3s; }
        
        .app-container { width: 100%; max-width: 480px; background: var(--bg-card); border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); overflow: hidden; transition: 0.3s; }

        /* Header chuẩn 7-Eleven */
        .app-header { background: var(--bg-card); display: flex; justify-content: space-between; align-items: center; padding: 15px 15px; border-bottom: 1px solid var(--border-color); position: relative; }
        .app-header::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 6px; background: linear-gradient(to right, var(--7e-green) 33%, var(--7e-red) 33%, var(--7e-red) 66%, var(--7e-orange) 66%); }
        
        .header-left { display: flex; align-items: center; gap: 10px; }
        .app-logo { height: 32px; width: auto; object-fit: contain; }
        .app-header h2 { color: var(--7e-green); font-size: 19px; font-weight: 800; }
        
        .theme-btn { background: none; border: none; font-size: 22px; cursor: pointer; padding: 5px; border-radius: 50%; }

        .app-body { padding: 20px; }
        .status-bar { text-align: center; font-size: 13px; font-weight: 600; padding: 8px; border-radius: 6px; margin-bottom: 20px; background: #e8f5e9; color: var(--7e-green); }

        .form-group { margin-bottom: 15px; }
        label { font-size: 13px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 6px; display: block; }
        input { width: 100%; padding: 12px; border: 2px solid var(--border-color); border-radius: 8px; font-size: 15px; background: var(--input-bg); color: var(--text-main); transition: 0.3s; }
        input:focus { border-color: var(--7e-green); outline: none; }

        .btn { width: 100%; padding: 14px; font-size: 15px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; color: white; display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 8px; transition: 0.2s; }
        .btn:active { transform: scale(0.98); }
        .btn-scan { background-color: var(--7e-orange); }
        .btn-scan:hover { background-color: #d6611a; }
        
        #reader { width: 100%; border-radius: 8px; overflow: hidden; margin-top: 10px; }

        /* Danh sách tạm (Làm lại theo style Lịch sử tra cứu cũ nhưng tối ưu hiển thị Barcode sọc) */
        .history-section { margin-top: 25px; border-top: 2px dashed var(--border-color); padding-top: 15px; }
        .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .history-header h3 { font-size: 15px; color: var(--text-muted); text-transform: uppercase; font-weight: bold; }
        .btn-clear-history { background: none; border: none; color: var(--7e-red); font-size: 13px; cursor: pointer; font-weight: bold; }
        
        .history-list { list-style: none; max-height: 400px; overflow-y: auto; }
        .history-item { background: var(--input-bg); border: 1px solid var(--border-color); margin-bottom: 10px; padding: 12px; border-radius: 12px; display: flex; flex-direction: column; gap: 8px; transition: 0.2s; box-shadow: 0 2px 6px rgba(0,0,0,0.02); }
        
        .item-info { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dotted var(--border-color); padding-bottom: 6px; }
        .hist-name { font-weight: 700; font-size: 15px; color: var(--text-main); max-width: 75%; }
        .hist-count { font-size: 11px; background: var(--border-color); color: var(--text-muted); padding: 2px 6px; border-radius: 20px; font-weight: bold; }
        
        /* Container bọc hình sọc mã vạch */
        .barcode-box { background: white; padding: 8px; border-radius: 8px; text-align: center; border: 1px solid #eee; width: 100%; display: flex; justify-content: center; }
        .barcode-box svg { max-width: 100%; height: auto; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="app-header">
        <div class="header-left">
            <img src="https://upload.wikimedia.org/wikipedia/commons/4/40/7-eleven_logo.svg" alt="7-Eleven Logo" class="app-logo">
            <h2>1167 Trương Định</h2>
        </div>
        <button class="theme-btn" onclick="toggleTheme()" id="themeIcon">🌙</button>
    </div>

    <div class="app-body">
        <div id="loadingStatus" class="status-bar">🔄 Đang đồng bộ máy chủ...</div>

        <div class="form-group">
            <label>Mã Vạch Sản Phẩm</label>
            <input type="text" id="barcodeInput" placeholder="Nhập mã hoặc quét camera...">
            <button class="btn btn-scan" onclick="startScan()">📷 BẬT MÁY QUÉT</button>
            <div id="reader"></div>
        </div>

        <div class="form-group">
            <label>Tên Sản Phẩm (Dropdown Chọn nhanh)</label>
            <input list="productDataList" id="nameInput" placeholder="Nhập tên sản phẩm để chọn nhanh...">
            <datalist id="productDataList"></datalist>
        </div>

        <div class="history-section">
            <div class="history-header">
                <h3>Danh sách tạm (<span id="itemCount">0</span>)</h3>
                <button class="btn-clear-history" onclick="clearAllList()">🗑️ Xóa tất cả</button>
            </div>
            <ul class="history-list" id="scannedListContainer">
                </ul>
        </div>
    </div>
</div>

<script>
    // Link Google Sheet API Apps Script của bạn
    const GOOGLE_SHEET_API = "https://script.google.com/macros/s/AKfycbzqLh2BkY03a_U8edoXOHMo_n4RM4sLwpbiaR0YCHStiNRV3DDIN4pQS2M2CmuM7vQcQg/exec"; 
    
    let products = []; 
    let html5QrCode; 
    let scannedList = JSON.parse(localStorage.getItem('scannedList')) || [];

    // --- DARK/LIGHT THEME ---
    function initTheme() {
        const savedTheme = localStorage.getItem('appTheme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        document.getElementById('themeIcon').innerText = savedTheme === 'dark' ? '☀️' : '🌙';
    }
    
    function toggleTheme() {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('appTheme', newTheme);
        document.getElementById('themeIcon').innerText = newTheme === 'dark' ? '☀️' : '🌙';
    }

    // --- KẾT NỐI DATABASE GOOGLE SHEET (Dữ liệu gốc) ---
    async function loadDatabaseFromSheet() {
        const statusDiv = document.getElementById('loadingStatus');
        try {
            const response = await fetch(GOOGLE_SHEET_API);
            products = await response.json();
            
            const datalist = document.getElementById('productDataList');
            datalist.innerHTML = ""; 
            products.forEach(p => {
                let option = document.createElement('option');
                option.value = p.ProductName;
                datalist.appendChild(option);
            });
            
            statusDiv.style.background = "#e8f5e9";
            statusDiv.style.color = "var(--7e-green)";
            statusDiv.innerText = "✅ Kết nối Database thành công!";
            setTimeout(() => { statusDiv.style.display = "none"; }, 2500); 
        } catch (error) {
            statusDiv.style.background = "#ffebee";
            statusDiv.style.color = "var(--7e-red)";
            statusDiv.innerText = "❌ Lỗi kết nối máy chủ / Dùng DB mẫu";
            
            // Database dự phòng nếu lỗi kết nối
            products = [
                {Barcode: "8934563123456", ProductName: "Mì Ly Cung Đình"},
                {Barcode: "8935001234567", ProductName: "Nước Ngọt Coca-Cola"}
            ];
        }
    }

    // --- XỬ LÝ SỰ KIỆN NHẬP LIỆU ---
    // 1. Khi gõ tay hoặc dùng súng quét quét vào ô Barcode (Nhấn Enter)
    document.getElementById('barcodeInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            const barcode = this.value.trim();
            if (barcode) {
                const found = products.find(p => String(p.Barcode) === barcode);
                const name = found ? found.ProductName : "Sản phẩm mới (Không có trong DB)";
                addItemToList(barcode, name);
                this.value = '';
            }
        }
    });

    // 2. Khi chọn sản phẩm từ ô Dropdown Tên sản phẩm
    document.getElementById('nameInput').addEventListener('input', function() {
        const nameVal = this.value.trim();
        const found = products.find(p => p.ProductName.toLowerCase() === nameVal.toLowerCase());
        if (found) {
            addItemToList(String(found.Barcode), found.ProductName);
            this.value = ''; // Reset ô nhập ngay lập tức
            document.getElementById('barcodeInput').focus();
        }
    });

    // --- CAMERA QUET MÃ ---
    function startScan() {
        if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
        const config = { fps: 15, qrbox: { width: 280, height: 100 } };

        html5QrCode.start(
            { facingMode: "environment" }, 
            config,
            (decodedText) => {
                const found = products.find(p => String(p.Barcode) === decodedText);
                const name = found ? found.ProductName : "Sản phẩm mới (Không có trong DB)";
                addItemToList(decodedText, name);
                
                html5QrCode.stop().then(() => {
                    document.getElementById('reader').innerHTML = ""; 
                });
            },
            (errorMessage) => { }
        ).catch(err => {
            alert("Vui lòng cấp quyền Camera và sử dụng link HTTPS!");
        });
    }

    // --- QUẢN LÝ DANH SÁCH TẠM ---
    function addItemToList(barcode, name) {
        const uniqueId = 'bc_' + Math.random().toString(36).substr(2, 9);
        
        // Đẩy lên đầu danh sách tạm
        scannedList.unshift({ id: uniqueId, barcode: barcode, name: name });
        localStorage.setItem('scannedList', JSON.stringify(scannedList));
        renderScannedList();
    }

    function renderScannedList() {
        const listEl = document.getElementById('scannedListContainer');
        const countEl = document.getElementById('itemCount');
        listEl.innerHTML = "";
        
        countEl.innerText = scannedList.length;

        if (scannedList.length === 0) {
            listEl.innerHTML = "<li style='text-align:center; color:#aaa; font-size:13px; padding: 20px 0;'>Chưa có sản phẩm nào được quét</li>";
            return;
        }

        scannedList.forEach((item, index) => {
            const li = document.createElement('li');
            li.className = 'history-item';
            li.innerHTML = `
                <div class="item-info">
                    <span class="hist-name">${item.name}</span>
                    <span class="hist-count">#${scannedList.length - index}</span>
                </div>
                <div class="barcode-box">
                    <svg id="${item.id}"></svg>
                </div>
            `;
            listEl.appendChild(li);

            // Vẽ sọc barcode hoàn chỉnh bằng thư viện JsBarcode
            setTimeout(() => {
                try {
                    JsBarcode(`#${item.id}`, String(item.barcode), {
                        format: "CODE128",
                        lineColor: "#000",
                        width: 1.8,
                        height: 45,
                        displayValue: true, // Hiển thị số nhỏ dưới chân sọc
                        fontSize: 13,
                        margin: 2
                    });
                } catch (e) {
                    document.getElementById(item.id).outerHTML = `<span style="color:var(--7e-red); font-size:12px; font-mono">Mã lỗi: ${item.barcode}</span>`;
                }
            }, 5);
        });
    }

    function clearAllList() {
        if (confirm("Bạn có chắc chắn muốn xóa TOÀN BỘ danh sách ghi chú tạm không?")) {
            scannedList = [];
            localStorage.removeItem('scannedList');
            renderScannedList();
        }
    }

    // --- KHỞI CHẠY ---
    window.onload = () => {
        initTheme();
        renderScannedList();
        loadDatabaseFromSheet();
    };
</script>
</body>
</html>
